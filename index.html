<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Fitness Vault</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #00ff88;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }
        .media-card {
            background: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            max-width: 320px;
            width: 100%;
        }
        /* --- CAROUSEL STYLES --- */
        .carousel {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }
        .carousel::-webkit-scrollbar {
            display: none;
        }
        .carousel-item {
            flex: 0 0 100%;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            background: #000;
        }
        /* --- MEDIA WRAPPER & DOWNLOAD BUTTONS --- */
        .media-wrapper {
            position: relative;
            width: 100%;
        }
        .carousel-item img {
            width: 100%;
            height: auto;
            display: block;
            max-height: 400px;
            object-fit: contain;
            cursor: pointer; /* Makes it look clickable */
            transition: opacity 0.2s;
        }
        .carousel-item img:hover {
            opacity: 0.85; /* Slight fade when hovering to show it is clickable */
        }
        .carousel-item video {
            width: 100%;
            height: auto;
            display: block;
            max-height: 400px;
            object-fit: contain;
        }
        .download-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
            transition: 0.3s;
        }
        .download-btn:hover {
            background: #00ff88;
            color: #000;
        }
        .media-title {
            padding: 15px 10px;
            font-size: 16px;
            font-weight: bold;
            word-break: break-all;
            background: #1e1e1e;
        }
        .swipe-hint {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
            display: block;
            font-weight: normal;
        }

        /* --- FULL SCREEN MODAL STYLES --- */
        .modal {
            display: none; /* Hidden by default */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .modal img {
            max-width: 95%;
            max-height: 80vh; /* Keeps it from going off-screen vertically */
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 25px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .close-btn:hover {
            color: #00ff88;
        }
        .modal-download {
            margin-top: 20px;
            background: #00ff88;
            color: #000;
            padding: 12px 24px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.2s;
        }
        .modal-download:hover {
            background: #fff;
        }
    </style>
</head>
<body>

    <h1>🏋️‍♂️ Fitness Media Gallery 🏋️‍♂️</h1>
    <p>Tap any picture to view full screen!</p>
    
    <div class="gallery" id="gallery"></div>

    <!-- THIS IS THE INVISIBLE FULL-SCREEN POPUP -->
    <div id="fullscreen-modal" class="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img id="modal-img" src="" alt="Fullscreen view">
        <a id="modal-download-btn" class="modal-download" href="" download target="_blank">⬇️ Download Image</a>
    </div>

    <script>
        const username = 'gummallamahithchowdary12345-droid'; 
        const repo = 'jump-dhnaush';           
        const folder = 'media';          

        const apiUrl = `https://api.github.com/repos/${username}/${repo}/contents/${folder}`;

        // Functions to handle the full-screen modal
        function openModal(imgSrc, fileName) {
            document.getElementById('modal-img').src = imgSrc;
            const modalDl = document.getElementById('modal-download-btn');
            modalDl.href = imgSrc;
            // The download attribute suggests the file name to the browser
            modalDl.download = fileName; 
            document.getElementById('fullscreen-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('fullscreen-modal').style.display = 'none';
            document.getElementById('modal-img').src = ''; // clears image to save memory
        }

        // Close modal if user clicks anywhere on the black background
        window.onclick = function(event) {
            const modal = document.getElementById('fullscreen-modal');
            if (event.target === modal) {
                closeModal();
            }
        }

        async function loadMedia() {
            const gallery = document.getElementById('gallery');
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Failed to fetch folder');
                const files = await response.json();

                const groups = {};
                files.forEach(file => {
                    if (!file.name.includes('.')) return; 

                    let prefix = file.name;
                    if (file.name.includes('-')) {
                        prefix = file.name.split('-')[0];
                    } else {
                        prefix = file.name.split('.')[0]; 
                    }

                    if (!groups[prefix]) {
                        groups[prefix] = [];
                    }
                    groups[prefix].push(file);
                });

                for (const [groupName, items] of Object.entries(groups)) {
                    items.sort((a, b) => a.name.localeCompare(b.name));

                    const card = document.createElement('div');
                    card.className = 'media-card';

                    const carousel = document.createElement('div');
                    carousel.className = 'carousel';

                    items.forEach(file => {
                        const itemContainer = document.createElement('div');
                        itemContainer.className = 'carousel-item';
                        
                        // Wrapper to hold media + download button
                        const wrapper = document.createElement('div');
                        wrapper.className = 'media-wrapper';

                        if (file.name.match(/\.(jpeg|jpg|gif|png|webp)$/i)) {
                            const img = document.createElement('img');
                            img.src = file.download_url;
                            img.loading = "lazy";
                            // Open full screen when clicked
                            img.onclick = () => openModal(file.download_url, file.name);
                            
                            // Small corner download button
                            const dlBtn = document.createElement('a');
                            dlBtn.href = file.download_url;
                            dlBtn.download = file.name;
                            dlBtn.target = "_blank";
                            dlBtn.className = 'download-btn';
                            dlBtn.innerHTML = '⬇️';

                            wrapper.appendChild(img);
                            wrapper.appendChild(dlBtn);
                            itemContainer.appendChild(wrapper);

                        } else if (file.name.match(/\.(mp4|webm|mov)$/i)) {
                            const video = document.createElement('video');
                            video.src = file.download_url;
                            video.controls = true;
                            video.preload = "metadata";
                            wrapper.appendChild(video);
                            itemContainer.appendChild(wrapper);
                        }
                        
                        carousel.appendChild(itemContainer);
                    });

                    card.appendChild(carousel);

                    const titleDiv = document.createElement('div');
                    titleDiv.className = 'media-title';
                    titleDiv.innerHTML = groupName;
                    
                    if (items.length > 1) {
                        titleDiv.innerHTML += `<span class="swipe-hint">👉 Swipe for more (${items.length} items)</span>`;
                    }
                    
                    card.appendChild(titleDiv);
                    gallery.appendChild(card);
                }

            } catch (error) {
                console.error('Error:', error);
                gallery.innerHTML = `<p style="color: red;">Error loading media.</p>`;
            }
        }

        loadMedia();
    </script>
</body>
</html>

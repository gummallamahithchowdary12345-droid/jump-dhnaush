<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Fitness Vault</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f4f8; 
            color: #1a202c; 
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #2b6cb0; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        p {
            color: #4a5568; 
            font-size: 15px;
        }

        /* --- STORIES SECTION --- */
        .stories-wrapper {
            background: #ffffff;
            border-radius: 16px;
            padding: 15px;
            margin: 0 auto 25px auto;
            max-width: 600px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            display: none; /* Hidden until a story is loaded */
        }
        .stories-title {
            text-align: left;
            font-size: 14px;
            font-weight: bold;
            color: #a0aec0;
            margin-top: 0;
            margin-bottom: 10px;
            padding-left: 5px;
        }
        .stories-container {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding-bottom: 5px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }
        .stories-container::-webkit-scrollbar { display: none; }
        
        .story-circle {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 3px solid #00ff88; /* Cool green ring around stories */
            padding: 2px;
            object-fit: cover; /* Keeps it a perfect circle */
            cursor: pointer;
            flex-shrink: 0;
            scroll-snap-align: start;
            transition: transform 0.2s;
            background: #e2e8f0;
        }
        .story-circle:hover {
            transform: scale(1.05);
        }

        /* --- POSTS GALLERY --- */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 10px 0;
        }
        .media-card {
            background: #ffffff; 
            border-radius: 16px; 
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08); 
            max-width: 320px;
            width: 100%;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .media-card:hover {
            transform: translateY(-5px); 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
        }

        /* --- CAROUSEL STYLES --- */
        .carousel {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }
        .carousel::-webkit-scrollbar { display: none; }
        .carousel-item {
            flex: 0 0 100%;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            background: #f8fafc; 
        }

        /* --- MEDIA WRAPPER & BUTTONS --- */
        .media-wrapper {
            position: relative;
            width: 100%;
        }
        .carousel-item img {
            width: 100%;
            height: auto;
            display: block;
            max-height: 400px;
            object-fit: contain;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .carousel-item img:hover { opacity: 0.85; }
        .carousel-item video {
            width: 100%;
            height: auto;
            display: block;
            max-height: 400px;
            object-fit: contain;
        }
        .download-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.9); 
            color: #2b6cb0; 
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: 0.3s;
        }
        .download-btn:hover { background: #2b6cb0; color: #ffffff; }
        .media-title {
            padding: 15px 10px;
            font-size: 16px;
            font-weight: bold;
            color: #2d3748;
            word-break: break-all;
            background: #ffffff;
            border-top: 1px solid #edf2f7; 
        }
        .swipe-hint {
            font-size: 12px;
            color: #a0aec0;
            margin-top: 5px;
            display: block;
            font-weight: normal;
        }

        /* --- FULL SCREEN MODAL STYLES --- */
        .modal {
            display: none; 
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.95); 
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .modal img, .modal video {
            max-width: 95%;
            max-height: 80vh;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: none; /* Hidden until chosen */
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 25px;
            color: #cbd5e1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .close-btn:hover { color: #ffffff; }
        .modal-download {
            margin-top: 20px;
            background: #2b6cb0; 
            color: #ffffff;
            padding: 12px 24px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(43, 108, 176, 0.4);
        }
        .modal-download:hover { background: #1a365d; }
    </style>
</head>
<body>

    <h1>🏋️‍♂️ Fitness Media Gallery 🏋️‍♂️</h1>
    <p>Prefix files with <b>story-</b> to add them to your Stories!</p>
    
    <div class="stories-wrapper" id="stories-wrapper">
        <p class="stories-title">Stories</p>
        <div class="stories-container" id="stories"></div>
    </div>

    <div class="gallery" id="gallery"></div>

    <div id="fullscreen-modal" class="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img id="modal-img" src="" alt="Fullscreen view">
        <video id="modal-vid" src="" controls></video>
        <a id="modal-download-btn" class="modal-download" href="" download target="_blank">⬇️ Download Media</a>
    </div>

    <script>
        const username = 'gummallamahithchowdary12345-droid'; 
        const repo = 'jump-dhnaush';           
        const folder = 'media';          

        const apiUrl = `https://api.github.com/repos/${username}/${repo}/contents/${folder}`;

        // Upgraded to handle videos in the popup!
        function openModal(mediaSrc, fileName) {
            const isVideo = fileName.match(/\.(mp4|webm|mov)$/i);
            const imgEl = document.getElementById('modal-img');
            const vidEl = document.getElementById('modal-vid');

            if (isVideo) {
                imgEl.style.display = 'none';
                vidEl.src = mediaSrc;
                vidEl.style.display = 'block';
                vidEl.play(); // Auto-plays the video when clicked
            } else {
                vidEl.style.display = 'none';
                vidEl.pause();
                imgEl.src = mediaSrc;
                imgEl.style.display = 'block';
            }

            const modalDl = document.getElementById('modal-download-btn');
            modalDl.href = mediaSrc;
            modalDl.download = fileName; 
            document.getElementById('fullscreen-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('fullscreen-modal').style.display = 'none';
            document.getElementById('modal-img').src = ''; 
            const vidEl = document.getElementById('modal-vid');
            vidEl.pause();
            vidEl.src = '';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('fullscreen-modal');
            if (event.target === modal) {
                closeModal();
            }
        }

        async function loadMedia() {
            const gallery = document.getElementById('gallery');
            const storiesContainer = document.getElementById('stories');
            const storiesWrapper = document.getElementById('stories-wrapper');

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Failed to fetch folder');
                const files = await response.json();

                const posts = [];
                const stories = [];

                // Sort files into Stories vs Posts
                files.forEach(file => {
                    if (!file.name.includes('.')) return; 
                    
                    if (file.name.toLowerCase().startsWith('story-')) {
                        stories.push(file);
                    } else {
                        posts.push(file);
                    }
                });

                // 1. RENDER STORIES
                if (stories.length > 0) {
                    storiesWrapper.style.display = 'block'; // Unhide the stories section
                    stories.forEach(file => {
                        let mediaElement;
                        if (file.name.match(/\.(jpeg|jpg|gif|png|webp)$/i)) {
                            mediaElement = document.createElement('img');
                        } else if (file.name.match(/\.(mp4|webm|mov)$/i)) {
                            mediaElement = document.createElement('video');
                        }
                        
                        if (mediaElement) {
                            mediaElement.src = file.download_url;
                            mediaElement.className = 'story-circle';
                            mediaElement.onclick = () => openModal(file.download_url, file.name);
                            storiesContainer.appendChild(mediaElement);
                        }
                    });
                }

                // 2. RENDER POSTS
                const groups = {};
                posts.forEach(file => {
                    let prefix = file.name;
                    if (file.name.includes('-')) {
                        prefix = file.name.split('-')[0];
                    } else {
                        prefix = file.name.split('.')[0]; 
                    }

                    if (!groups[prefix]) { groups[prefix] = []; }
                    groups[prefix].push(file);
                });

                for (const [groupName, items] of Object.entries(groups)) {
                    items.sort((a, b) => a.name.localeCompare(b.name));

                    const card = document.createElement('div');
                    card.className = 'media-card';

                    const carousel = document.createElement('div');
                    carousel.className = 'carousel';

                    items.forEach(file => {
                        const itemContainer = document.createElement('div');
                        itemContainer.className = 'carousel-item';
                        
                        const wrapper = document.createElement('div');
                        wrapper.className = 'media-wrapper';

                        if (file.name.match(/\.(jpeg|jpg|gif|png|webp)$/i)) {
                            const img = document.createElement('img');
                            img.src = file.download_url;
                            img.loading = "lazy";
                            img.onclick = () => openModal(file.download_url, file.name);
                            
                            const dlBtn = document.createElement('a');
                            dlBtn.href = file.download_url;
                            dlBtn.download = file.name;
                            dlBtn.target = "_blank";
                            dlBtn.className = 'download-btn';
                            dlBtn.innerHTML = '⬇️';

                            wrapper.appendChild(img);
                            wrapper.appendChild(dlBtn);
                            itemContainer.appendChild(wrapper);

                        } else if (file.name.match(/\.(mp4|webm|mov)$/i)) {
                            const video = document.createElement('video');
                            video.src = file.download_url;
                            video.controls = true;
                            video.preload = "metadata";
                            wrapper.appendChild(video);
                            itemContainer.appendChild(wrapper);
                        }
                        
                        carousel.appendChild(itemContainer);
                    });

                    card.appendChild(carousel);

                    const titleDiv = document.createElement('div');
                    titleDiv.className = 'media-title';
                    titleDiv.innerHTML = groupName;
                    
                    if (items.length > 1) {
                        titleDiv.innerHTML += `<span class="swipe-hint">👉 Swipe for more (${items.length} items)</span>`;
                    }
                    
                    card.appendChild(titleDiv);
                    gallery.appendChild(card);
                }

            } catch (error) {
                console.error('Error:', error);
                gallery.innerHTML = `<p style="color: red;">Error loading media.</p>`;
            }
        }

        loadMedia();
    </script>
</body>
</html>

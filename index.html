<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Fitness Vault</title>
    <style>
        /* --- GLOBAL STYLES & PREMIUM DARK THEME --- */
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: rgba(15, 23, 42, 0.95);
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-primary: #00ff88;
            --accent-secondary: #00b8ff;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(0, 255, 136, 0.05), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(0, 184, 255, 0.05), transparent 40%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
        }

        /* --- LEFT SIDEBAR NAVIGATION --- */
        .sidebar {
            width: 240px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--glass-border);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            box-sizing: border-box;
            z-index: 1000;
        }

        .brand {
            color: #ffffff;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            font-size: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            text-align: center;
        }

        .nav-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid transparent;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
        }

        /* Active Tab Styling */
        .nav-btn.active {
            background: rgba(0, 255, 136, 0.1);
            color: var(--accent-primary);
            border: 1px solid rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
        }

        /* --- MAIN CONTENT AREA --- */
        .main-content {
            margin-left: 240px; /* Offset for sidebar */
            padding: 30px;
            width: calc(100% - 240px);
            box-sizing: border-box;
            min-height: 100vh;
        }

        .tab-content {
            display: none; /* Hidden by default, JS controls this */
            animation: fadeIn 0.4s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-header {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        /* --- STORIES GRID (Upgraded for its own page) --- */
        .stories-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 20px;
        }
        
        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        
        .story-ring {
            background: linear-gradient(45deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 50%;
            padding: 4px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.2);
        }
        
        .story-item:hover .story-ring { transform: scale(1.08); }
        
        .story-circle {
            width: 90px; /* Made bigger since they have their own tab now */
            height: 90px;
            border-radius: 50%;
            border: 4px solid var(--bg-color); 
            object-fit: cover;
            background: #1e293b;
            display: block;
        }
        
        .story-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-align: center;
        }

        /* --- POSTS GALLERY (Shared for X & Main) --- */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .media-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px; 
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); 
            max-width: 320px;
            width: 100%;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .media-card:hover {
            transform: translateY(-8px); 
            box-shadow: 0 20px 40px rgba(0, 255, 136, 0.15);
        }

        .carousel-wrapper { position: relative; width: 100%; background: #000; }
        .carousel {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            scrollbar-width: none; scroll-behavior: smooth;
        }
        .carousel::-webkit-scrollbar { display: none; }
        .carousel-item {
            flex: 0 0 100%; scroll-snap-align: start; display: flex;
            align-items: center; justify-content: center; position: relative; height: 400px; 
        }
        .carousel-item img, .carousel-item video { width: 100%; height: 100%; object-fit: cover; }
        
        .slide-btn {
            position: absolute; top: 50%; transform: translateY(-50%); background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px); color: var(--text-main); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%; width: 36px; height: 36px; font-size: 16px; cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .slide-btn:hover { background: var(--accent-primary); color: #000; border-color: transparent; }
        .slide-btn.left { left: 8px; } .slide-btn.right { right: 8px; }

        .action-buttons { position: absolute; bottom: 12px; right: 12px; display: flex; gap: 10px; z-index: 5; }
        .btn-icon {
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); color: var(--text-main); 
            border: 1px solid rgba(255,255,255,0.1); padding: 10px 12px; border-radius: 12px;
            font-size: 16px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: all 0.2s;
        }
        .btn-icon:hover { background: var(--accent-primary); color: #000; transform: scale(1.1); }

        .media-title {
            padding: 18px 15px; font-size: 16px; font-weight: 700; color: var(--text-main);
            word-break: break-all; background: rgba(30, 41, 59, 0.4); border-top: 1px solid var(--glass-border); 
            text-align: left;
        }

        /* --- FULL SCREEN MODAL --- */
        .modal {
            display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100vw; height: 100vh;
            background-color: rgba(0, 0, 0, 0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            align-items: center; justify-content: center; flex-direction: column;
        }
        .modal-content-wrapper { position: relative; display: flex; align-items: center; justify-content: center; width: 100vw; height: 85vh; touch-action: pan-y; }
        .modal img, .modal video { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
        .modal-nav {
            position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px); color: white; border: none; border-radius: 50%; width: 50px; height: 50px;
            font-size: 24px; cursor: pointer; z-index: 10001; transition: 0.2s;
        }
        .modal-nav:hover { background: var(--accent-primary); color: black; }
        #modal-prev { left: 20px; } #modal-next { right: 20px; }
        .close-btn { position: absolute; top: 20px; right: 30px; color: rgba(255,255,255,0.6); font-size: 40px; font-weight: 300; cursor: pointer; z-index: 10002; transition: 0.2s; }
        .close-btn:hover { color: #fff; transform: rotate(90deg); }
        .modal-download {
            position: absolute; bottom: 30px; background: linear-gradient(45deg, var(--accent-primary), var(--accent-secondary));
            color: #000; border: none; padding: 14px 28px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
            border-radius: 30px; font-size: 15px; cursor: pointer; transition: all 0.3s; box-shadow: 0 8px 25px rgba(0, 255, 136, 0.4); z-index: 10001;
        }
        .modal-download:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0, 255, 136, 0.6); }
        
        .story-progress-container { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; gap: 5px; z-index: 10001; }
        .story-progress-bar { height: 3px; background: rgba(255,255,255,0.3); flex-grow: 1; border-radius: 3px; overflow: hidden; }
        .story-progress-fill { height: 100%; background: #fff; width: 0%; transition: width 0.3s; }

        /* --- MOBILE RESPONSIVE (Turns sidebar into bottom app nav) --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%; height: 70px; top: auto; bottom: 0; flex-direction: row; 
                justify-content: space-around; padding: 10px; border-right: none; 
                border-top: 1px solid var(--glass-border);
            }
            .brand { display: none; }
            .nav-btn { margin-bottom: 0; padding: 10px; font-size: 14px; flex-direction: column; gap: 2px; }
            .main-content { margin-left: 0; margin-bottom: 70px; width: 100%; padding: 15px; }
        }
    </style>
</head>
<body>

    <!-- LEFT SIDEBAR / BOTTOM APP BAR -->
    <nav class="sidebar">
        <div class="brand">Vault</div>
        <!-- By default, Main is active -->
        <button class="nav-btn active" onclick="switchTab('tab-main', this)">
            📷 Insta / Main
        </button>
        <button class="nav-btn" onclick="switchTab('tab-x', this)">
            🐦 𝕏 Log
        </button>
        <button class="nav-btn" onclick="switchTab('tab-stories', this)">
            ⭕ Stories
        </button>
    </nav>

    <!-- CONTENT AREA -->
    <main class="main-content">
        
        <!-- INSTA MAIN TAB -->
        <div id="tab-main" class="tab-content" style="display: block;">
            <h2 class="section-header">Main Vault</h2>
            <div class="gallery" id="gallery"></div>
        </div>

        <!-- X TAB -->
        <div id="tab-x" class="tab-content">
            <h2 class="section-header">𝕏 Log</h2>
            <div class="gallery" id="x-gallery"></div>
        </div>

        <!-- STORIES TAB -->
        <div id="tab-stories" class="tab-content">
            <h2 class="section-header">Story Highlights</h2>
            <div class="stories-container" id="stories"></div>
        </div>

    </main>

    <!-- FULL-SCREEN VIEWER (Shared by everything) -->
    <div id="fullscreen-modal" class="modal">
        <div class="story-progress-container" id="modal-progress"></div>
        <span class="close-btn" onclick="closeModal()">&times;</span>
        
        <button class="modal-nav" id="modal-prev" onclick="changeModalSlide(-1)">❮</button>
        
        <div class="modal-content-wrapper" id="swipe-zone">
            <img id="modal-img" src="" alt="Fullscreen view">
            <video id="modal-vid" src="" controls playsinline></video>
        </div>
        
        <button class="modal-nav" id="modal-next" onclick="changeModalSlide(1)">❯</button>
        <button id="modal-download-btn" class="modal-download">⬇ Download</button>
    </div>

    <script>
        const username = 'gummallamahithchowdary12345-droid'; 
        const repo = 'jump-dhnaush';            
        const folder = 'media';          
        const apiUrl = `https://api.github.com/repos/${username}/${repo}/contents/${folder}`;

        let currentViewerItems = [];
        let currentViewerIndex = 0;

        // --- TAB SWITCHING LOGIC ---
        function switchTab(tabId, clickedBtn) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.style.display = 'none';
            });
            // Remove 'active' class from all buttons
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            // Show requested tab & highlight button
            document.getElementById(tabId).style.display = 'block';
            clickedBtn.classList.add('active');
        }

        // --- INSTANT FORCE-DOWNLOAD ---
        async function forceDownload(url, fileName, event) {
            if(event) event.stopPropagation(); 
            const btn = event ? event.currentTarget : document.getElementById('modal-download-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳'; 
            btn.style.opacity = '0.7';

            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = blobUrl;
                a.download = fileName; 
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(blobUrl);
                document.body.removeChild(a);
            } catch (error) {
                console.error("Force-download failed:", error);
                window.open(url, '_blank');
            }
            btn.innerHTML = originalText; 
            btn.style.opacity = '1';
        }

        // --- FULL SCREEN MODAL LOGIC ---
        function openModal(items, index) {
            currentViewerItems = items;
            currentViewerIndex = index;
            document.getElementById('fullscreen-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden'; 
            updateModalView();
            renderModalProgress();
        }

        function updateModalView() {
            const file = currentViewerItems[currentViewerIndex];
            const imgEl = document.getElementById('modal-img');
            const vidEl = document.getElementById('modal-vid');
            const isVideo = file.name.match(/\.(mp4|webm|mov)$/i);

            if (isVideo) {
                imgEl.style.display = 'none';
                vidEl.src = file.download_url;
                vidEl.style.display = 'block';
                vidEl.play();
            } else {
                vidEl.style.display = 'none';
                vidEl.pause();
                imgEl.src = file.download_url;
                imgEl.style.display = 'block';
            }

            const dlBtn = document.getElementById('modal-download-btn');
            dlBtn.onclick = (e) => forceDownload(file.download_url, file.name, e);

            const showNav = currentViewerItems.length > 1;
            document.getElementById('modal-prev').style.display = showNav ? 'block' : 'none';
            document.getElementById('modal-next').style.display = showNav ? 'block' : 'none';
            updateProgressFills();
        }

        function renderModalProgress() {
            const container = document.getElementById('modal-progress');
            container.innerHTML = '';
            if (currentViewerItems.length <= 1) return;
            for (let i = 0; i < currentViewerItems.length; i++) {
                const bar = document.createElement('div');
                bar.className = 'story-progress-bar';
                bar.innerHTML = `<div class="story-progress-fill" id="prog-fill-${i}"></div>`;
                container.appendChild(bar);
            }
            updateProgressFills();
        }

        function updateProgressFills() {
            if (currentViewerItems.length <= 1) return;
            for (let i = 0; i < currentViewerItems.length; i++) {
                const fill = document.getElementById(`prog-fill-${i}`);
                if (fill) {
                    if (i < currentViewerIndex) fill.style.width = '100%';
                    else if (i === currentViewerIndex) fill.style.width = '50%'; 
                    else fill.style.width = '0%';
                }
            }
        }

        function changeModalSlide(direction) {
            currentViewerIndex += direction;
            if (currentViewerIndex >= currentViewerItems.length) currentViewerIndex = 0;
            if (currentViewerIndex < 0) currentViewerIndex = currentViewerItems.length - 1;
            updateModalView();
        }

        function closeModal() {
            document.getElementById('fullscreen-modal').style.display = 'none';
            document.body.style.overflow = 'auto'; 
            document.getElementById('modal-vid').pause();
            currentViewerItems = [];
        }

        let touchstartX = 0;
        let touchendX = 0;
        const swipeZone = document.getElementById('swipe-zone');

        swipeZone.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; });
        swipeZone.addEventListener('touchend', e => { touchendX = e.changedTouches[0].screenX; handleSwipe(); });

        function handleSwipe() {
            const threshold = 50; 
            if (touchendX < touchstartX - threshold) changeModalSlide(1); 
            if (touchendX > touchstartX + threshold) changeModalSlide(-1); 
        }

        function scrollCarousel(btn, direction) {
            const carousel = btn.parentElement.querySelector('.carousel');
            carousel.scrollBy({ left: direction * 320, behavior: 'smooth' });
        }

        // --- RENDER A GALLERY SECTION ---
        function renderGallerySection(groupsObj, galleryElementId) {
            const keys = Object.keys(groupsObj).sort((a, b) => b.localeCompare(a)); 
            if (keys.length === 0) return;

            const gallery = document.getElementById(galleryElementId);

            keys.forEach(groupName => {
                const items = groupsObj[groupName];
                items.sort((a, b) => a.name.localeCompare(b.name)); 

                const card = document.createElement('div');
                card.className = 'media-card';

                const wrapper = document.createElement('div');
                wrapper.className = 'carousel-wrapper';

                const carousel = document.createElement('div');
                carousel.className = 'carousel';

                if (items.length > 1) {
                    wrapper.innerHTML += `
                        <button class="slide-btn left" onclick="scrollCarousel(this, -1)">❮</button>
                        <button class="slide-btn right" onclick="scrollCarousel(this, 1)">❯</button>
                    `;
                }

                items.forEach((file, index) => {
                    const itemContainer = document.createElement('div');
                    itemContainer.className = 'carousel-item';

                    let mediaHtml = '';
                    if (file.name.match(/\.(jpeg|jpg|gif|png|webp)$/i)) {
                        mediaHtml = `<img src="${file.download_url}" loading="lazy">`;
                    } else if (file.name.match(/\.(mp4|webm|mov)$/i)) {
                        mediaHtml = `<video src="${file.download_url}" controls preload="metadata"></video>`;
                    }

                    itemContainer.innerHTML = `
                        ${mediaHtml}
                        <div class="action-buttons">
                            <button class="btn-icon" onclick="openModal(${JSON.stringify(items).replace(/"/g, '&quot;')}, ${index})" title="Expand">🔍</button>
                            <button class="btn-icon" onclick="forceDownload('${file.download_url}', '${file.name}', event)" title="Download">⬇️</button>
                        </div>
                    `;
                    carousel.appendChild(itemContainer);
                });

                wrapper.appendChild(carousel);
                card.appendChild(wrapper);

                const titleDiv = document.createElement('div');
                titleDiv.className = 'media-title';
                titleDiv.innerHTML = groupName;
                
                card.appendChild(titleDiv);
                gallery.appendChild(card);
            });
        }


        // --- FETCH AND RENDER MEDIA ---
        async function loadMedia() {
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Failed to fetch folder');
                const files = await response.json();

                const storiesGroups = {};
                const xGroups = {};
                const postsGroups = {};

                files.forEach(file => {
                    if (!file.name.includes('.')) return; 
                    
                    let nameLC = file.name.toLowerCase();
                    
                    if (nameLC.startsWith('s-')) {
                        let cleanName = file.name.substring(2); 
                        let groupName = cleanName.split(/[-_.]/)[0];
                        if (!storiesGroups[groupName]) storiesGroups[groupName] = [];
                        storiesGroups[groupName].push(file);
                        
                    } else if (nameLC.startsWith('x-')) {
                        let cleanName = file.name.substring(2); 
                        let groupName = cleanName.split(/[-_.]/)[0];
                        if (!xGroups[groupName]) xGroups[groupName] = [];
                        xGroups[groupName].push(file);
                        
                    } else {
                        let groupName = file.name.split(/[-_.]/)[0];
                        if (!postsGroups[groupName]) postsGroups[groupName] = [];
                        postsGroups[groupName].push(file);
                    }
                });

                // RENDER STORIES
                const storyKeys = Object.keys(storiesGroups).sort((a, b) => b.localeCompare(a)); 
                if (storyKeys.length > 0) {
                    const storiesContainer = document.getElementById('stories');
                    storyKeys.forEach(groupName => {
                        const items = storiesGroups[groupName];
                        items.sort((a, b) => a.name.localeCompare(b.name)); 
                        
                        const firstItem = items[0];
                        const storyWrap = document.createElement('div');
                        storyWrap.className = 'story-item';
                        storyWrap.onclick = () => openModal(items, 0);

                        let mediaElement;
                        if (firstItem.name.match(/\.(jpeg|jpg|gif|png|webp)$/i)) {
                            mediaElement = `<img src="${firstItem.download_url}" class="story-circle">`;
                        } else {
                            mediaElement = `<video src="${firstItem.download_url}#t=0.1" class="story-circle" preload="metadata"></video>`;
                        }

                        storyWrap.innerHTML = `
                            <div class="story-ring">${mediaElement}</div>
                            <span class="story-label">${groupName}</span>
                        `;
                        storiesContainer.appendChild(storyWrap);
                    });
                }

                // RENDER X & MAIN POSTS
                renderGallerySection(xGroups, 'x-gallery');
                renderGallerySection(postsGroups, 'gallery');

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('gallery').innerHTML = `<p style="color: #ff3366;">Error loading media vault. Check Console (F12).</p>`;
            }
        }

        loadMedia();
    </script>
</body>
</html>
